# Docker Compose 本地开发环境
# 用法：
#   基础服务：docker-compose up -d
#   含 Redis：docker-compose --profile cache up -d
#   仅后端推荐：docker-compose up -d db keycloak + dotnet run

services:
  api:
    build: ./backend
    ports:
      - "5267:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Database=aisch;Username=dev;Password=dev
      - Keycloak__Authority=${KEYCLOAK_AUTHORITY:-http://localhost:8080/realms/aisch}
      - Keycloak__ClientId=${KEYCLOAK_CLIENT_ID:-lceda-ai}
      - Keycloak__Audience=${KEYCLOAK_AUDIENCE:-account}
      - Keycloak__RequireHttpsMetadata=${KEYCLOAK_REQUIRE_HTTPS:-false}
      - OpenAI__Endpoint=${OPENAI_ENDPOINT}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - OpenAI__ModelName=${OPENAI_MODEL_NAME:-gpt-4o}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  db:
    image: postgres:18-alpine3.22
    environment:
      POSTGRES_DB: aisch
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dev", "-d", "aisch"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 首次启动时自动执行补充初始化（扩展、权限等）
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

  # Keycloak 使用外部服务: https://auth.verdure-hiro.cn/realms/maker-community

  redis:
    image: redis:7.4-alpine3.21
    ports:
      - "6379:6379"
    profiles:
      - cache

volumes:
  postgres_data:
